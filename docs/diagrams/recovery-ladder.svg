<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 360" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="ar4" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#6B7280"/>
    </marker>
  </defs>
  <style>
    .t{font-size:19px;font-weight:700;fill:#111827}
    .h{font-size:15px;font-weight:700;fill:#111827}
    .l{font-size:12px;fill:#374151}
    .s{font-size:11px;fill:#6B7280}
  </style>

  <text x="30" y="32" class="t">When a step fails: climb the ladder, never skip a rung</text>
  <text x="30" y="54" class="s">Cheapest fix first. You may only go up a level after the level below is exhausted - that's what stops endless retry/replan loops.</text>

  <!-- Level 1 -->
  <rect x="40" y="250" width="240" height="80" rx="12" fill="#ECFDF5" stroke="#059669" stroke-width="1.8"/>
  <text x="58" y="276" class="h">Level 1 - retry</text>
  <text x="58" y="298" class="l">just run the node again</text>
  <text x="58" y="316" class="s">for blips: timeout, rate limit, network</text>

  <!-- Level 2 -->
  <rect x="300" y="170" width="240" height="80" rx="12" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.8"/>
  <text x="318" y="196" class="h">Level 2 - patch</text>
  <text x="318" y="218" class="l">reconfigure just this node, retry</text>
  <text x="318" y="236" class="s">for: bad output, auth error (plan unchanged)</text>

  <!-- Level 3 -->
  <rect x="560" y="90" width="240" height="80" rx="12" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.8"/>
  <text x="578" y="116" class="h">Level 3 - replan</text>
  <text x="578" y="138" class="l">throw out the plan, make a new version</text>
  <text x="578" y="156" class="s">for: missing dependency, broken structure</text>

  <!-- ascending arrows -->
  <line x1="280" y1="270" x2="300" y2="232" stroke="#6B7280" stroke-width="1.8" marker-end="url(#ar4)"/>
  <text x="250" y="252" class="s">still failing?</text>
  <line x1="540" y1="192" x2="560" y2="152" stroke="#6B7280" stroke-width="1.8" marker-end="url(#ar4)"/>
  <text x="512" y="178" class="s">still failing?</text>

  <text x="40" y="352" class="s">Costs and risk grow as you climb: a retry is free-ish; a full replan is the most expensive and least predictable, so it is the last resort.</text>
</svg>
