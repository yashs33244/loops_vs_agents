<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 320" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="ard" markerWidth="9" markerHeight="9" refX="7.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7.5,3 L0,6 z" fill="#9CA3AF"/>
    </marker>
  </defs>
  <style>
    .t{font-size:19px;font-weight:700;fill:#111827}
    .s{font-size:11px;fill:#6B7280}
    .n{font-size:12px;fill:#111827}
    .edge{stroke:#9CA3AF;stroke-width:1.5;fill:none}
  </style>

  <text x="30" y="28" class="t">The bug-fix task as a graph (green = a parallel wave)</text>

  <!-- round labels -->
  <text x="60"  y="50" class="s">round 1</text>
  <text x="230" y="50" class="s">round 2</text>
  <text x="400" y="50" class="s">round 3</text>
  <text x="565" y="50" class="s">round 4</text>
  <text x="760" y="50" class="s">round 5</text>
  <text x="915" y="50" class="s">round 6</text>

  <!-- edges -->
  <line x1="160" y1="78"  x2="210" y2="78"  class="edge" marker-end="url(#ard)"/>
  <line x1="160" y1="138" x2="210" y2="138" class="edge" marker-end="url(#ard)"/>
  <line x1="330" y1="78"  x2="380" y2="100" class="edge" marker-end="url(#ard)"/>
  <line x1="330" y1="138" x2="380" y2="116" class="edge" marker-end="url(#ard)"/>
  <line x1="500" y1="104" x2="550" y2="58"  class="edge" marker-end="url(#ard)"/>
  <line x1="500" y1="108" x2="550" y2="118" class="edge" marker-end="url(#ard)"/>
  <line x1="500" y1="112" x2="550" y2="178" class="edge" marker-end="url(#ard)"/>
  <line x1="670" y1="58"  x2="740" y2="92"  class="edge" marker-end="url(#ard)"/>
  <line x1="670" y1="118" x2="740" y2="104" class="edge" marker-end="url(#ard)"/>
  <line x1="860" y1="98"  x2="900" y2="130" class="edge" marker-end="url(#ard)"/>
  <path d="M 670,178 C 800,178 820,138 898,134" class="edge" marker-end="url(#ard)"/>

  <!-- nodes: green = parallel wave, indigo = solo -->
  <rect x="40"  y="60"  width="120" height="36" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/><text x="100" y="83"  class="n" text-anchor="middle">search_auth</text>
  <rect x="40"  y="120" width="120" height="36" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/><text x="100" y="143" class="n" text-anchor="middle">search_utils</text>

  <rect x="210" y="60"  width="120" height="36" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/><text x="270" y="83"  class="n" text-anchor="middle">read_auth</text>
  <rect x="210" y="120" width="120" height="36" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/><text x="270" y="143" class="n" text-anchor="middle">read_utils</text>

  <rect x="380" y="90"  width="120" height="36" rx="8" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/><text x="440" y="113" class="n" text-anchor="middle">analyze</text>

  <rect x="550" y="40"  width="120" height="36" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/><text x="610" y="63"  class="n" text-anchor="middle">fix_A</text>
  <rect x="550" y="100" width="120" height="36" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/><text x="610" y="123" class="n" text-anchor="middle">fix_B</text>
  <rect x="550" y="160" width="120" height="36" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/><text x="610" y="183" class="n" text-anchor="middle">update_docs</text>

  <rect x="740" y="80"  width="120" height="36" rx="8" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/><text x="800" y="103" class="n" text-anchor="middle">run_tests</text>

  <rect x="900" y="116" width="120" height="36" rx="8" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/><text x="960" y="139" class="n" text-anchor="middle">report</text>

  <text x="520" y="232" class="s">fix_A and fix_B are "any_of": run both, keep whichever passes its tests, skip the other.</text>
  <text x="520" y="250" class="s">analyze uses "all_of": it cannot start until BOTH reads finish - enforced by the graph, not by memory.</text>
  <text x="40"  y="232" class="s">Rounds 1, 2, 4 each run 2-3 nodes</text>
  <text x="40"  y="250" class="s">at the same time (|U| up to 3).</text>
  <text x="40"  y="286" class="s" fill="#059669">Measured: ~11.2s if done one-by-one  -&gt;  ~6.8s following this graph's longest path.</text>
</svg>
