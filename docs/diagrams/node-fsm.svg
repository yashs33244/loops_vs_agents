<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arf" markerWidth="9" markerHeight="9" refX="7.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7.5,3 L0,6 z" fill="#6B7280"/>
    </marker>
  </defs>
  <style>
    .t{font-size:19px;font-weight:700;fill:#111827}
    .s{font-size:11px;fill:#6B7280}
    .n{font-size:12px;fill:#111827;font-weight:600}
    .e{font-size:10px;fill:#6B7280}
    .edge{stroke:#9CA3AF;stroke-width:1.5;fill:none}
  </style>

  <text x="30" y="30" class="t">A node's life: the state machine each step walks</text>
  <text x="560" y="30" class="s">shaded = final (never leaves)</text>

  <!-- edges first (under boxes) -->
  <!-- happy path -->
  <line x1="150" y1="81" x2="198" y2="81" class="edge" marker-end="url(#arf)"/><text x="150" y="74" class="e">deps met</text>
  <line x1="320" y1="81" x2="368" y2="81" class="edge" marker-end="url(#arf)"/><text x="330" y="74" class="e">dispatch</text>
  <line x1="490" y1="81" x2="558" y2="81" class="edge" marker-end="url(#arf)"/><text x="495" y="74" class="e">success + contract OK</text>
  <!-- running branches -->
  <line x1="430" y1="102" x2="430" y2="148" class="edge" marker-end="url(#arf)"/><text x="436" y="128" class="e">transient err</text>
  <line x1="478" y1="100" x2="560" y2="150" class="edge" marker-end="url(#arf)"/><text x="486" y="120" class="e">structural err</text>
  <line x1="378" y1="98" x2="312" y2="150" class="edge" marker-end="url(#arf)"/><text x="300" y="120" class="e">needs human</text>
  <!-- retry back-edge -->
  <path d="M 372,156 Q 210,118 96,104" class="edge" marker-end="url(#arf)"/><text x="180" y="128" class="e">retry (budget left)</text>
  <!-- failed_retryable -> failed / skipped -->
  <line x1="448" y1="192" x2="558" y2="178" class="edge" marker-end="url(#arf)"/><text x="452" y="205" class="e">budget out</text>
  <line x1="440" y1="192" x2="585" y2="248" class="edge" marker-end="url(#arf)"/><text x="470" y="240" class="e">sibling won (any_of)</text>
  <!-- waiting_human transitions -->
  <line x1="248" y1="150" x2="248" y2="104" class="edge" marker-end="url(#arf)"/><text x="180" y="142" class="e">resume</text>
  <line x1="272" y1="192" x2="272" y2="248" class="edge" marker-end="url(#arf)"/><text x="278" y="225" class="e">timeout</text>
  <!-- blocked -->
  <line x1="205" y1="98" x2="150" y2="150" class="edge" marker-end="url(#arf)"/><text x="120" y="120" class="e">dep lost</text>
  <line x1="90" y1="150" x2="90" y2="104" class="edge" marker-end="url(#arf)"/><text x="96" y="135" class="e">dep cleared</text>

  <!-- boxes -->
  <g>
    <rect x="30"  y="60"  width="120" height="42" rx="9" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/><text x="90"  y="86" class="n" text-anchor="middle">pending</text>
    <rect x="200" y="60"  width="120" height="42" rx="9" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/><text x="260" y="86" class="n" text-anchor="middle">ready</text>
    <rect x="370" y="60"  width="120" height="42" rx="9" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/><text x="430" y="86" class="n" text-anchor="middle">running</text>
    <rect x="560" y="60"  width="120" height="42" rx="9" fill="#E5E7EB" stroke="#374151" stroke-width="2"/><text x="620" y="86" class="n" text-anchor="middle">executed</text>

    <rect x="200" y="150" width="120" height="42" rx="9" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/><text x="260" y="176" class="n" text-anchor="middle">waiting_human</text>
    <rect x="370" y="150" width="120" height="42" rx="9" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/><text x="430" y="170" class="n" text-anchor="middle">failed_</text><text x="430" y="184" class="n" text-anchor="middle">retryable</text>
    <rect x="560" y="150" width="120" height="42" rx="9" fill="#E5E7EB" stroke="#374151" stroke-width="2"/><text x="620" y="176" class="n" text-anchor="middle">failed</text>
    <rect x="30"  y="150" width="120" height="42" rx="9" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/><text x="90"  y="176" class="n" text-anchor="middle">blocked</text>

    <rect x="200" y="248" width="120" height="42" rx="9" fill="#E5E7EB" stroke="#374151" stroke-width="2"/><text x="260" y="274" class="n" text-anchor="middle">cancelled</text>
    <rect x="560" y="248" width="120" height="42" rx="9" fill="#E5E7EB" stroke="#374151" stroke-width="2"/><text x="620" y="274" class="n" text-anchor="middle">skipped</text>
  </g>

  <text x="30" y="330" class="s">Blue = active, orange = waiting/recoverable, grey = final. The retry loop is bounded by a budget,</text>
  <text x="30" y="346" class="s">so a node can never spin forever - it always ends in executed, failed, cancelled, or skipped.</text>
</svg>
