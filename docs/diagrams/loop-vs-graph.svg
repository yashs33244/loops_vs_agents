<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 580" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#9CA3AF"/>
    </marker>
  </defs>
  <style>
    .t{font-size:20px;font-weight:700;fill:#111827}
    .h{font-size:15px;font-weight:700;fill:#111827}
    .l{font-size:12.5px;fill:#111827}
    .s{font-size:11px;fill:#6B7280}
    .edge{stroke:#9CA3AF;stroke-width:1.6;fill:none}
  </style>

  <text x="40" y="34" class="t">The same task: a loop vs a graph</text>
  <text x="40" y="56" class="s">Task: "fix a Python auth bug and update the docs"</text>

  <!-- ===== LEFT: agent loop ===== -->
  <text x="60" y="84" class="h">Agent loop (today): one step at a time</text>
  <!-- sequential arrow -->
  <line x1="48" y1="96" x2="48" y2="502" class="edge" marker-end="url(#ar)"/>
  <text x="30" y="300" class="s" transform="rotate(-90 30 300)">sequential, one runs at a time</text>

  <g>
    <!-- 11 stacked turns -->
    <g>
      <rect x="64" y="96"  width="220" height="30" rx="7" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.4"/><text x="74" y="115" class="l">1  search_auth</text>
      <rect x="64" y="134" width="220" height="30" rx="7" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.4"/><text x="74" y="153" class="l">2  search_utils</text>
      <rect x="64" y="172" width="220" height="30" rx="7" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.4"/><text x="74" y="191" class="l">3  read_auth</text>
      <rect x="64" y="210" width="220" height="30" rx="7" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.4"/><text x="74" y="229" class="l">4  read_utils</text>
      <rect x="64" y="248" width="220" height="30" rx="7" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.4"/><text x="74" y="267" class="l">5  analyze</text>
      <rect x="64" y="286" width="220" height="30" rx="7" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.4"/><text x="74" y="305" class="l">6  fix (patch A)</text>
      <rect x="64" y="324" width="220" height="30" rx="7" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.4"/><text x="74" y="343" class="l">7  run_tests  FAIL</text>
      <rect x="64" y="362" width="220" height="30" rx="7" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.4"/><text x="74" y="381" class="l">8  fix (patch B)  ad-hoc</text>
      <rect x="64" y="400" width="220" height="30" rx="7" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.4"/><text x="74" y="419" class="l">9  run_tests  OK</text>
      <rect x="64" y="438" width="220" height="30" rx="7" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.4"/><text x="74" y="457" class="l">10 update_docs</text>
      <rect x="64" y="476" width="220" height="30" rx="7" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.4"/><text x="74" y="495" class="l">11 report</text>
    </g>
  </g>
  <text x="64" y="528" class="s">11 turns, strictly back-to-back. The two searches and the docs</text>
  <text x="64" y="544" class="s">update could have overlapped, but a loop never lets them.</text>

  <!-- divider -->
  <line x1="360" y1="76" x2="360" y2="556" stroke="#E5E7EB" stroke-width="1.2"/>

  <!-- ===== RIGHT: graph ===== -->
  <text x="500" y="84" class="h">Graph harness: independent work runs together</text>

  <!-- Round 1 -->
  <rect x="500" y="96" width="150" height="40" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/><text x="512" y="121" class="l">search_auth</text>
  <rect x="672" y="96" width="150" height="40" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/><text x="684" y="121" class="l">search_utils</text>
  <text x="838" y="120" class="s">round 1</text>
  <text x="838" y="134" class="s">|U|=2</text>

  <!-- Round 2 -->
  <rect x="500" y="164" width="150" height="40" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/><text x="512" y="189" class="l">read_auth</text>
  <rect x="672" y="164" width="150" height="40" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/><text x="684" y="189" class="l">read_utils</text>
  <text x="838" y="188" class="s">round 2</text>
  <text x="838" y="202" class="s">|U|=2</text>

  <!-- Round 3 -->
  <rect x="586" y="232" width="150" height="40" rx="8" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/><text x="598" y="257" class="l">analyze</text>
  <text x="838" y="256" class="s">round 3</text>
  <text x="600" y="227" class="s">waits for BOTH reads (all_of)</text>

  <!-- Round 4 -->
  <rect x="470" y="300" width="120" height="40" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/><text x="482" y="325" class="l">fix_A</text>
  <rect x="600" y="300" width="120" height="40" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/><text x="612" y="325" class="l">fix_B</text>
  <rect x="730" y="300" width="120" height="40" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/><text x="742" y="325" class="l">update_docs</text>
  <text x="470" y="295" class="s">fix_A / fix_B = any_of: keep whichever passes, skip the other &#183; |U|=3</text>

  <!-- Round 5 -->
  <rect x="586" y="368" width="150" height="40" rx="8" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/><text x="598" y="393" class="l">run_tests</text>
  <text x="838" y="392" class="s">round 5</text>

  <!-- Round 6 -->
  <rect x="586" y="436" width="150" height="40" rx="8" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/><text x="598" y="461" class="l">report</text>
  <text x="838" y="460" class="s">round 6</text>

  <!-- connectors -->
  <line x1="661" y1="136" x2="661" y2="164" class="edge" marker-end="url(#ar)"/>
  <line x1="661" y1="204" x2="661" y2="232" class="edge" marker-end="url(#ar)"/>
  <line x1="661" y1="272" x2="661" y2="300" class="edge" marker-end="url(#ar)"/>
  <line x1="661" y1="340" x2="661" y2="368" class="edge" marker-end="url(#ar)"/>
  <line x1="661" y1="408" x2="661" y2="436" class="edge" marker-end="url(#ar)"/>

  <text x="500" y="512" class="s">6 rounds instead of 11 turns. Up to 3 nodes run at once.</text>
  <text x="500" y="528" class="s">The parallelism is built into the graph, not left to luck.</text>
  <text x="500" y="548" class="l" fill="#059669">Measured on gemini-3.1-flash-lite: ~11.2s sequential -&gt; ~6.8s critical path.</text>
</svg>
