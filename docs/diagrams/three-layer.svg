<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 430" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="ar3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#6B7280"/>
    </marker>
  </defs>
  <style>
    .t{font-size:19px;font-weight:700;fill:#111827}
    .h{font-size:15px;font-weight:700;fill:#111827}
    .l{font-size:12px;fill:#374151}
    .s{font-size:11px;fill:#6B7280}
    .edge{stroke:#6B7280;stroke-width:1.8;fill:none}
  </style>

  <text x="30" y="32" class="t">Three jobs, kept strictly separate</text>
  <text x="30" y="54" class="s">Each layer has one responsibility. They talk through narrow, defined hand-offs - never by reaching into each other.</text>

  <!-- Planner -->
  <rect x="80" y="78" width="430" height="70" rx="12" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.8"/>
  <text x="100" y="106" class="h">1. Planner</text>
  <text x="100" y="128" class="l">turns a task into a checked graph (which steps, what depends on what)</text>
  <text x="100" y="143" class="s">an LLM, a template, or both - the only layer allowed to decide structure</text>

  <!-- Runtime -->
  <rect x="80" y="196" width="430" height="70" rx="12" fill="#ECFDF5" stroke="#059669" stroke-width="1.8"/>
  <text x="100" y="224" class="h">2. Runtime</text>
  <text x="100" y="246" class="l">runs the graph as-is; tracks each node's state; runs ready nodes</text>
  <text x="100" y="261" class="s">NEVER edits the graph - it only executes and reports what happened</text>

  <!-- Recovery -->
  <rect x="80" y="314" width="430" height="70" rx="12" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.8"/>
  <text x="100" y="342" class="h">3. Recovery</text>
  <text x="100" y="364" class="l">when a node fails, decides what to do: retry, patch, or ask for a new plan</text>
  <text x="100" y="379" class="s">the only layer that reads the failure history</text>

  <!-- arrows down -->
  <line x1="295" y1="148" x2="295" y2="196" class="edge" marker-end="url(#ar3)"/>
  <text x="305" y="176" class="s">checked graph (frozen)</text>
  <line x1="230" y1="266" x2="230" y2="314" class="edge" marker-end="url(#ar3)"/>
  <text x="240" y="294" class="s">failure report</text>
  <!-- recovery back to runtime -->
  <path d="M 360,314 C 380,290 380,272 360,266" class="edge" marker-end="url(#ar3)"/>
  <text x="372" y="294" class="s">retry / patch</text>
  <!-- recovery to planner (replan) -->
  <path d="M 500,330 C 600,300 600,120 512,108" class="edge" marker-end="url(#ar3)"/>
  <text x="600" y="230" class="s">ask for a</text>
  <text x="600" y="246" class="s">new plan</text>
  <text x="600" y="262" class="s">(last resort)</text>

  <!-- context split panel -->
  <rect x="560" y="78" width="230" height="120" rx="12" fill="#F9FAFB" stroke="#9CA3AF" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="576" y="102" class="h">Two sealed notebooks</text>
  <text x="576" y="126" class="l" fill="#059669">work notes</text>
  <text x="576" y="142" class="s">inputs + results a node can see</text>
  <text x="576" y="166" class="l" fill="#EA580C">failure notes</text>
  <text x="576" y="182" class="s">errors + old plans, hidden from nodes</text>

  <text x="80" y="416" class="s">Why split the notebooks: if failure history leaked into a node's inputs, old errors would quietly corrupt fresh reasoning.</text>
</svg>
