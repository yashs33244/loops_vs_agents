<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 470" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="aro" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="#9CA3AF"/>
    </marker>
  </defs>
  <style>
    .t{font-size:19px;font-weight:700;fill:#111827}
    .h{font-size:14px;font-weight:700;fill:#374151}
    .n{font-size:12px;fill:#111827;font-weight:600}
    .s{font-size:11px;fill:#6B7280}
    .map{stroke:#A78BFA;stroke-width:1.4;stroke-dasharray:4 3;fill:none}
  </style>

  <text x="30" y="30" class="t">You already learned this graph: OS process states = our node states</text>

  <text x="120" y="66" class="h">OS process scheduler</text>
  <text x="560" y="66" class="h">SGH node lifecycle</text>

  <!-- OS column -->
  <g>
    <rect x="60" y="84"  width="180" height="40" rx="8" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/><text x="150" y="109" class="n" text-anchor="middle">New</text>
    <rect x="60" y="148" width="180" height="40" rx="8" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/><text x="150" y="173" class="n" text-anchor="middle">Ready  (ready queue)</text>
    <rect x="60" y="212" width="180" height="40" rx="8" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/><text x="150" y="237" class="n" text-anchor="middle">Running (on a CPU)</text>
    <rect x="60" y="276" width="180" height="40" rx="8" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/><text x="150" y="301" class="n" text-anchor="middle">Blocked / Waiting</text>
    <rect x="60" y="340" width="180" height="40" rx="8" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/><text x="150" y="365" class="n" text-anchor="middle">Suspended</text>
    <rect x="60" y="404" width="180" height="40" rx="8" fill="#E5E7EB" stroke="#374151" stroke-width="2"/><text x="150" y="429" class="n" text-anchor="middle">Terminated</text>
  </g>

  <!-- SGH column -->
  <g>
    <rect x="600" y="84"  width="200" height="40" rx="8" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/><text x="700" y="109" class="n" text-anchor="middle">pending</text>
    <rect x="600" y="148" width="200" height="40" rx="8" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/><text x="700" y="173" class="n" text-anchor="middle">ready  (the ready-set U)</text>
    <rect x="600" y="212" width="200" height="40" rx="8" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/><text x="700" y="237" class="n" text-anchor="middle">running (on a worker)</text>
    <rect x="600" y="276" width="200" height="40" rx="8" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/><text x="700" y="301" class="n" text-anchor="middle">blocked / waiting_human</text>
    <rect x="600" y="340" width="200" height="40" rx="8" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/><text x="700" y="358" class="n" text-anchor="middle">parked on a rate-limit</text><text x="700" y="373" class="s" text-anchor="middle">token (token bucket)</text>
    <rect x="600" y="404" width="200" height="40" rx="8" fill="#E5E7EB" stroke="#374151" stroke-width="2"/><text x="700" y="423" class="n" text-anchor="middle">executed / failed /</text><text x="700" y="437" class="s" text-anchor="middle">cancelled / skipped</text>
  </g>

  <!-- mapping lines -->
  <line x1="240" y1="104" x2="600" y2="104" class="map"/>
  <line x1="240" y1="168" x2="600" y2="168" class="map"/>
  <line x1="240" y1="232" x2="600" y2="232" class="map"/>
  <line x1="240" y1="296" x2="600" y2="296" class="map"/>
  <line x1="240" y1="360" x2="600" y2="360" class="map"/>
  <line x1="240" y1="424" x2="600" y2="424" class="map"/>

  <!-- center insight -->
  <text x="430" y="140" class="s" text-anchor="middle">ready-set |U|</text>
  <text x="430" y="153" class="s" text-anchor="middle">= degree of</text>
  <text x="430" y="166" class="s" text-anchor="middle">multiprogramming</text>

  <text x="30" y="462" class="s">Key borrow: OS schedulers obsess over minimizing context-switch overhead and keeping a process's working set warm. Our equivalent of a cold context-switch is making each agent re-read everything - and prompt caching is how we keep the working set warm.</text>
</svg>
